name: Release Binaries

on:
  push:
    branches:
      - main
    tags:
      - 'v*' # Trigger only when you push a version tag like v1.0.0

permissions:
  contents: write # Required to upload binaries to the release

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/checkout@v5
        with:
          go-version: '1.25' # Match your local Ubuntu version

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v5
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}